services:
  - type: web
    name: dekkal-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter
    region: frankfurt
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://dekkal-public.vercel.app
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: "8001"
      - key: HOST
        value: 0.0.0.0
    healthCheckPath: /api/v1/health
