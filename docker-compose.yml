services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dekkal-backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/workspace/backend
      - ${HOME}/.config/earthengine:/root/.config/earthengine:ro
    env_file:
      - backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dekkal-frontend
    ports:
      - "5174:5174"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - BACKEND_URL=http://backend:8001
    depends_on:
      - backend
    restart: unless-stopped
